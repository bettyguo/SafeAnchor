# ===========================================================================
# Debug Training Configuration — Fast iteration, small data
# Usage: python train.py training=debug
# ===========================================================================

defaults:
  - default

# Reduced scale for fast debugging
train_samples_per_domain: 64
epochs_per_domain: 1
eval_every_n_steps: 10
save_every_n_steps: 50
batch_size: 2
max_seq_length: 128

# Reduced safety sets
safety:
  n_calibration: 32
  n_probe: 16

# Disable W&B in debug mode
wandb:
  enabled: false
